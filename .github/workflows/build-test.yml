name: "Build Test"

on: workflow_dispatch

jobs:
  build-test:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-26" # Apple Silicon (M1+). macOS 26 for Apple Intelligence SDK.
            args: "--target aarch64-apple-darwin"
            target: "aarch64-apple-darwin"
          - platform: "windows-latest"
            args: ""
            target: "x86_64-pc-windows-msvc"
          - platform: "ubuntu-24.04" # AppImage (runs anywhere) + .deb (Ubuntu/Debian)
            args: "--bundles appimage,deb"
            target: "x86_64-unknown-linux-gnu"

    uses: ./.github/workflows/build.yml
    with:
      platform: ${{ matrix.platform }}
      target: ${{ matrix.target }}
      build-args: ${{ matrix.args }}
      sign-binaries: false
      asset-prefix: "handy-hackathon"
      upload-artifacts: true
      is-debug-build: ${{ contains(matrix.args, '--debug') }}
    secrets: inherit
